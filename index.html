                                                            }} className="btn-comentar">💬 Comentar</button>
                                                        </>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })
                                )}
                            </div>
                        )}
                        
                        {seccionAlumno === "historial" && (
                            <div>
                                <div className="media-card">
                                    <div>
                                        <h3>📊 NOTA MEDIA</h3>
                                        <div className="media-valor">{mediaAlumno ? `${mediaAlumno}/10` : 'Sin notas'}</div>
                                        <div>{mensajeMedia}</div>
                                        {mediaAlumno && (
                                            <div style={{ width: "200px", height: "8px", background: "rgba(255,255,255,0.3)", borderRadius: "10px", marginTop: "10px" }}>
                                                <div style={{ width: `${porcentajeMedia}%`, height: "100%", background: mediaAlumno >= 7 ? "#2E6B3E" : mediaAlumno >= 5 ? "#f5a623" : "#c0392b", borderRadius: "10px" }}></div>
                                            </div>
                                        )}
                                    </div>
                                    <div style={{ fontSize: "3rem" }}>{emojiMedia}</div>
                                </div>
                                
                                <div className="card">
                                    <h3>📋 Calificaciones</h3>
                                    <table style={{ width: "100%", borderCollapse: "collapse", marginTop: "15px" }}>
                                        <thead><tr style={{ background: "#3B2510", color: "white" }}><th style={{ padding: "10px", textAlign: "left" }}>Tarea</th><th style={{ padding: "10px", textAlign: "center" }}>Nota</th><th style={{ padding: "10px", textAlign: "center" }}>Fecha</th></tr></thead>
                                        <tbody>
                                            {tareasAlumno.flatMap(t => {
                                                const califs = calificaciones[alumnoActual.id]?.[t.id] || [];
                                                if (califs.length === 0) {
                                                    return [<tr key={t.id} style={{ borderBottom: "1px solid #ddd" }}><td style={{ padding: "10px" }}>{t.nombre}</td><td colSpan="2" style={{ textAlign: "center", color: "#999" }}>Sin calificar</td></tr>];
                                                }
                                                return califs.map((c, i) => (<tr key={`${t.id}-${i}`} style={{ borderBottom: "1px solid #ddd" }}><td style={{ padding: "10px" }}>{t.nombre}</td><td style={{ padding: "10px", textAlign: "center", fontWeight: "bold", color: c.nota >= 5 ? "#2E6B3E" : "#c0392b" }}>{c.nota}/10</td><td style={{ padding: "10px", textAlign: "center", fontSize: "0.7rem" }}>{new Date(c.fecha).toLocaleDateString()}</td></tr>));
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                        
                        <div className="footer"><div className="footer-texto">mlls</div></div>
                        {toast && <div className="toast">{toast}</div>}
                    </div>
                );
            }
            
            return null;
        }
        
        ReactDOM.render(<App />, document.getElementById("root"));
    </script>
</body>
</html>

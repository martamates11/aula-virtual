<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AULA v00 - Completa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f0e8; padding: 20px; }
        button { cursor: pointer; padding: 8px 16px; margin: 5px; border-radius: 8px; border: none; transition: all 0.2s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        
        .header {
            background: #3B2510;
            padding: 16px 24px;
            margin-bottom: 20px;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header-titulo { font-size: 1rem; font-weight: 600; color: #F5EDD8; }
        .btn-salir {
            background: transparent;
            border: 1px solid rgba(245,237,216,0.4);
            color: #F5EDD8;
            padding: 5px 14px;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        
        .menu {
            background: #fefcf8;
            padding: 12px 24px;
            border-bottom: 1px solid #e8dfc8;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            border-radius: 0 0 12px 12px;
        }
        .menu-btn {
            background: transparent;
            padding: 8px 18px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #6B4F35;
            border-radius: 20px;
            transition: all 0.2s;
        }
        .menu-btn:hover { background: #e8dfc8; color: #3B2510; }
        .menu-btn.active { background: #A0522D; color: white; }
        
        .footer {
            margin-top: 30px;
            padding: 16px 24px 20px 24px;
            border-top: 1px solid #e8dfc8;
            text-align: center;
        }
        .footer-texto { font-size: 8px; color: #bbb; letter-spacing: 2px; text-transform: lowercase; }
        
        .card { background: white; border-radius: 12px; padding: 20px; margin: 10px 0; border-left: 4px solid #D97A2B; }
        .btn-verde { background: #2E6B3E; color: white; }
        .btn-rojo { background: #8B1A1A; color: white; }
        .btn-marron { background: #A0522D; color: white; }
        .btn-azul { background: #1a4f8a; color: white; }
        .btn-naranja { background: #D97A2B; color: white; }
        select, input, textarea { padding: 8px; border-radius: 6px; border: 1px solid #ccc; }
        
        .grupo-alumnos {
            background: white;
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .grupo-header {
            background: #3B2510;
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
        }
        .tabla-alumnos { width: 100%; border-collapse: collapse; }
        .tabla-alumnos th, .tabla-alumnos td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        .tabla-alumnos th { background: #f8f5f0; color: #3B2510; }
        
        .grupo-tareas {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .tarea-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        
        .artefacto-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        
        .grupo-historial {
            background: white;
            border-radius: 12px;
            margin-bottom: 20px;
            overflow-x: auto;
        }
        .historial-header {
            background: #3B2510;
            color: white;
            padding: 12px 20px;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .historial-tabla { width: 100%; border-collapse: collapse; min-width: 500px; }
        .historial-tabla th, .historial-tabla td { padding: 10px; text-align: center; border: 1px solid #ddd; }
        .historial-tabla th { background: #e8dfc8; color: #3B2510; }
        .nota-cell { font-weight: bold; border-radius: 6px; display: inline-block; padding: 4px 10px; min-width: 45px; }
        .nota-vacia { color: #ccc; font-style: italic; }
        .nota-10-bg { background: #1a7a1a; color: white; }
        .nota-9-bg { background: #6dbf6d; color: white; }
        .nota-8-bg { background: #1a4f8a; color: white; }
        .nota-7-bg { background: #5b9bd5; color: white; }
        .nota-6-bg { background: #c05c00; color: white; }
        .nota-5-bg { background: #f5a623; color: black; }
        .nota-0-bg { background: #c0392b; color: white; }
        
        .loading { text-align: center; padding: 40px; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #A0522D; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #2E6B3E; color: white; padding: 12px 24px; border-radius: 8px; animation: fadeOut 2s ease-in-out; z-index: 2000; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        
        .btn-cambiar-grupo {
            background: #A0522D;
            color: white;
            padding: 4px 12px;
            border-radius: 6px;
            margin-left: 8px;
        }
        
        .btn-gris {
            background: #95a5a6;
            color: white;
        }
        
        .acciones-grupo {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="text/babel">
        const SUPABASE_URL = "https://jtrntlywxpskdvidulor.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_h5iDbbdeNO-H3ELQeIw2KQ_N-Ub1FXA";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        function App() {
            const [cargando, setCargando] = React.useState(true);
            const [vista, setVista] = React.useState("login");
            const [alumnoActual, setAlumnoActual] = React.useState(null);
            const [seccionGestor, setSeccionGestor] = React.useState("pendientes");
            const [seccionAlumno, setSeccionAlumno] = React.useState("tareas");
            const [alumnos, setAlumnos] = React.useState([]);
            const [grupos, setGrupos] = React.useState([]);
            const [gruposData, setGruposData] = React.useState([]);
            const [artefactos, setArtefactos] = React.useState([]);
            const [tareasPorGrupo, setTareasPorGrupo] = React.useState({});
            const [calificaciones, setCalificaciones] = React.useState({});
            const [toast, setToast] = React.useState(null);
            const [mostrarModalArtefacto, setMostrarModalArtefacto] = React.useState(false);
            const [mostrarModalCopiarGrupo, setMostrarModalCopiarGrupo] = React.useState(false);
            const [nuevoArtefacto, setNuevoArtefacto] = React.useState({ nombre: "", html: "" });
            const [tareaSeleccionada, setTareaSeleccionada] = React.useState("");
            const [grupoOrigen, setGrupoOrigen] = React.useState("");
            const [nuevoNombreGrupo, setNuevoNombreGrupo] = React.useState("");
            
            // Cargar datos
            React.useEffect(() => {
                async function cargarDatos() {
                    try {
                        const [alumnosRes, gruposRes, artefactosRes, tareasGrupoRes, calificacionesRes] = await Promise.all([
                            supabase.from("alumnos").select("*"),
                            supabase.from("grupos").select("*").eq("activo", true),
                            supabase.from("tareas").select("*").eq("activo", true),
                            supabase.from("tareas_por_grupo").select("*"),
                            supabase.from("calificaciones").select("*")
                        ]);
                        setAlumnos(alumnosRes.data || []);
                        setGruposData(gruposRes.data || []);
                        setGrupos(gruposRes.data.map(g => g.nombre) || []);
                        setArtefactos(artefactosRes.data || []);
                        
                        // Procesar tareas por grupo
                        const tareasGrupoObj = {};
                        gruposRes.data.forEach(g => tareasGrupoObj[g.nombre] = []);
                        (tareasGrupoRes.data || []).forEach(item => {
                            const grupo = gruposRes.data.find(g => g.id === item.grupo_id);
                            if (grupo) tareasGrupoObj[grupo.nombre].push(item.tarea_id.toString());
                        });
                        setTareasPorGrupo(tareasGrupoObj);
                        
                        // Procesar calificaciones
                        const califObj = {};
                        (calificacionesRes.data || []).forEach(c => {
                            if (!califObj[c.alumno_id]) califObj[c.alumno_id] = {};
                            if (!califObj[c.alumno_id][c.tarea_id]) califObj[c.alumno_id][c.tarea_id] = [];
                            califObj[c.alumno_id][c.tarea_id].push({ nota: c.nota, fecha: c.fecha });
                        });
                        setCalificaciones(califObj);
                    } catch (err) { console.error(err); }
                    finally { setCargando(false); }
                }
                cargarDatos();
            }, []);
            
            const mostrarToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2000); };
            
            const getMejorNota = (alumnoId, tareaId) => {
                if (!calificaciones[alumnoId] || !calificaciones[alumnoId][tareaId]) return null;
                return Math.max(...calificaciones[alumnoId][tareaId].map(c => c.nota));
            };
            
            const getClaseNota = (nota) => {
                if (nota === null) return "nota-vacia";
                if (nota === 10) return "nota-10-bg";
                if (nota === 9) return "nota-9-bg";
                if (nota === 8) return "nota-8-bg";
                if (nota === 7) return "nota-7-bg";
                if (nota === 6) return "nota-6-bg";
                if (nota === 5) return "nota-5-bg";
                return "nota-0-bg";
            };
            
            const getMediaAlumno = (alumnoId, tareasList) => {
                const notas = [];
                tareasList.forEach(tareaId => {
                    const nota = getMejorNota(alumnoId, tareaId);
                    if (nota !== null) notas.push(nota);
                });
                if (notas.length === 0) return null;
                return (notas.reduce((a,b) => a + b, 0) / notas.length).toFixed(1);
            };
            
            const cambiarGrupoAlumno = async (id, nuevoGrupo) => {
                const { error } = await supabase.from("alumnos").update({ grupo: nuevoGrupo }).eq("id", id);
                if (!error) {
                    const nuevosAlumnos = await supabase.from("alumnos").select("*");
                    setAlumnos(nuevosAlumnos.data);
                    mostrarToast(`✅ Alumno movido a ${nuevoGrupo || "Sin grupo"}`);
                }
            };
            
            const eliminarAlumno = async (id) => {
                if (confirm("¿Eliminar este alumno?")) {
                    await supabase.from("alumnos").delete().eq("id", id);
                    const nuevosAlumnos = await supabase.from("alumnos").select("*");
                    setAlumnos(nuevosAlumnos.data);
                    mostrarToast("🗑️ Alumno eliminado");
                }
            };
            
            const aprobarAlumno = async (id, grupo) => {
                await supabase.from("alumnos").update({ aprobado: true, grupo: grupo }).eq("id", id);
                const nuevosAlumnos = await supabase.from("alumnos").select("*");
                setAlumnos(nuevosAlumnos.data);
                mostrarToast(`✅ Alumno aprobado y asignado a ${grupo}`);
            };
            
            const agregarArtefacto = async () => {
                if (!nuevoArtefacto.nombre || !nuevoArtefacto.html) { alert("Completa nombre y código HTML"); return; }
                await supabase.from("tareas").insert({ nombre: nuevoArtefacto.nombre, descripcion: "Artefacto personalizado", nivel: "Personalizado", html: nuevoArtefacto.html, activo: true });
                const nuevosArtefactos = await supabase.from("tareas").select("*").eq("activo", true);
                setArtefactos(nuevosArtefactos.data);
                setNuevoArtefacto({ nombre: "", html: "" });
                setMostrarModalArtefacto(false);
                mostrarToast(`✅ Artefacto "${nuevoArtefacto.nombre}" añadido`);
            };
            
            const eliminarArtefacto = async (id) => {
                if (confirm("¿Eliminar este artefacto?")) {
                    await supabase.from("tareas").update({ activo: false }).eq("id", id);
                    const nuevosArtefactos = await supabase.from("tareas").select("*").eq("activo", true);
                    setArtefactos(nuevosArtefactos.data);
                    mostrarToast("🗑️ Artefacto eliminado");
                }
            };
            
            const copiarCodigo = (html) => { navigator.clipboard.writeText(html); mostrarToast("📋 Código HTML copiado"); };
            
            const crearGrupo = async () => {
                const nuevoNombre = prompt("Nombre del nuevo grupo:");
                if (nuevoNombre && !grupos.includes(nuevoNombre)) {
                    await supabase.from("grupos").insert({ nombre: nuevoNombre });
                    const nuevosGrupos = await supabase.from("grupos").select("*").eq("activo", true);
                    setGruposData(nuevosGrupos.data);
                    setGrupos(nuevosGrupos.data.map(g => g.nombre));
                    mostrarToast(`✅ Grupo "${nuevoNombre}" creado`);
                } else if (nuevoNombre) { alert("El grupo ya existe"); }
            };
            
            const copiarGrupo = async () => {
                if (!grupoOrigen) {
                    alert("Selecciona un grupo origen");
                    return;
                }
                if (!nuevoNombreGrupo) {
                    alert("Introduce un nombre para el nuevo grupo");
                    return;
                }
                if (grupos.includes(nuevoNombreGrupo)) {
                    alert("Ya existe un grupo con ese nombre");
                    return;
                }
                
                try {
                    // 1. Obtener el ID del grupo origen
                    const grupoOrigenData = gruposData.find(g => g.nombre === grupoOrigen);
                    if (!grupoOrigenData) {
                        alert("Grupo origen no encontrado");
                        return;
                    }
                    
                    // 2. Crear el nuevo grupo
                    const { data: nuevoGrupoData, error: errorCrear } = await supabase
                        .from("grupos")
                        .insert({ nombre: nuevoNombreGrupo, activo: true })
                        .select();
                    
                    if (errorCrear) throw errorCrear;
                    
                    const nuevoGrupoId = nuevoGrupoData[0].id;
                    
                    // 3. Obtener las tareas del grupo origen
                    const tareasOrigen = tareasPorGrupo[grupoOrigen] || [];
                    
                    // 4. Copiar las asignaciones de tareas al nuevo grupo
                    if (tareasOrigen.length > 0) {
                        const nuevasAsignaciones = tareasOrigen.map(tareaId => ({
                            grupo_id: nuevoGrupoId,
                            tarea_id: parseInt(tareaId)
                        }));
                        
                        const { error: errorAsignar } = await supabase
                            .from("tareas_por_grupo")
                            .insert(nuevasAsignaciones);
                        
                        if (errorAsignar) throw errorAsignar;
                    }
                    
                    // 5. Actualizar el estado
                    const nuevosGrupos = await supabase.from("grupos").select("*").eq("activo", true);
                    setGruposData(nuevosGrupos.data);
                    setGrupos(nuevosGrupos.data.map(g => g.nombre));
                    
                    // 6. Actualizar tareasPorGrupo
                    const nuevasTareasGrupo = await supabase.from("tareas_por_grupo").select("*");
                    const tareasGrupoObj = {};
                    nuevosGrupos.data.forEach(g => tareasGrupoObj[g.nombre] = []);
                    nuevasTareasGrupo.data.forEach(item => {
                        const grupo = nuevosGrupos.data.find(g => g.id === item.grupo_id);
                        if (grupo) tareasGrupoObj[grupo.nombre].push(item.tarea_id.toString());
                    });
                    setTareasPorGrupo(tareasGrupoObj);
                    
                    mostrarToast(`✅ Grupo "${nuevoNombreGrupo}" creado con las tareas de "${grupoOrigen}"`);
                    setMostrarModalCopiarGrupo(false);
                    setGrupoOrigen("");
                    setNuevoNombreGrupo("");
                    
                } catch (error) {
                    console.error("Error al copiar grupo:", error);
                    mostrarToast("❌ Error al copiar el grupo");
                }
            };
            
            const eliminarGrupo = async (grupo) => {
                if (confirm(`¿Eliminar grupo "${grupo}"?`)) {
                    const grupoRes = await supabase.from("grupos").select("id").eq("nombre", grupo).single();
                    if (grupoRes.data) {
                        await supabase.from("tareas_por_grupo").delete().eq("grupo_id", grupoRes.data.id);
                        await supabase.from("grupos").delete().eq("id", grupoRes.data.id);
                        const nuevosGrupos = await supabase.from("grupos").select("*").eq("activo", true);
                        setGruposData(nuevosGrupos.data);
                        setGrupos(nuevosGrupos.data.map(g => g.nombre));
                        mostrarToast(`🗑️ Grupo "${grupo}" eliminado`);
                    }
                }
            };
            
            const asignarTareaAGrupo = async (grupo, tareaId) => {
                if (!tareaId) return;
                const grupoRes = await supabase.from("grupos").select("id").eq("nombre", grupo).single();
                if (grupoRes.data) {
                    await supabase.from("tareas_por_grupo").insert({ grupo_id: grupoRes.data.id, tarea_id: parseInt(tareaId) });
                    const nuevasTareasGrupo = await supabase.from("tareas_por_grupo").select("*");
                    const tareasGrupoObj = {};
                    grupos.forEach(g => tareasGrupoObj[g] = []);
                    nuevasTareasGrupo.data.forEach(item => {
                        const grupoNom = grupos.find(g => gruposData.find(gr => gr.id === item.grupo_id)?.nombre === g);
                        if (grupoNom) tareasGrupoObj[grupoNom].push(item.tarea_id.toString());
                    });
                    setTareasPorGrupo(tareasGrupoObj);
                    mostrarToast(`✅ Tarea asignada al grupo ${grupo}`);
                    setTareaSeleccionada("");
                }
            };
            
            const quitarTareaDeGrupo = async (grupo, tareaId) => {
                const grupoRes = await supabase.from("grupos").select("id").eq("nombre", grupo).single();
                if (grupoRes.data) {
                    await supabase.from("tareas_por_grupo").delete().eq("grupo_id", grupoRes.data.id).eq("tarea_id", parseInt(tareaId));
                    const nuevasTareasGrupo = await supabase.from("tareas_por_grupo").select("*");
                    const tareasGrupoObj = {};
                    grupos.forEach(g => tareasGrupoObj[g] = []);
                    nuevasTareasGrupo.data.forEach(item => {
                        const grupoNom = grupos.find(g => gruposData.find(gr => gr.id === item.grupo_id)?.nombre === g);
                        if (grupoNom) tareasGrupoObj[grupoNom].push(item.tarea_id.toString());
                    });
                    setTareasPorGrupo(tareasGrupoObj);
                    mostrarToast(`🗑️ Tarea removida del grupo ${grupo}`);
                }
            };
            
            const pendientes = alumnos.filter(a => !a.aprobado);
            const aprobados = alumnos.filter(a => a.aprobado);
            
            const alumnosPorGrupo = {};
            grupos.forEach(grupo => { alumnosPorGrupo[grupo] = aprobados.filter(a => a.grupo === grupo); });
            const alumnosSinGrupo = aprobados.filter(a => !a.grupo || !grupos.includes(a.grupo));
            if (alumnosSinGrupo.length > 0) { alumnosPorGrupo["Sin grupo"] = alumnosSinGrupo; }
            
            if (cargando) {
                return <div className="loading"><div className="spinner"></div><p>Cargando datos...</p></div>;
            }
            
            // LOGIN
            if (vista === "login") {
                const alumnosAprobadosLogin = alumnos.filter(a => a.aprobado);
                return (
                    <div style={{ maxWidth: "400px", margin: "50px auto", textAlign: "center" }}>
                        <h1 style={{ marginBottom: "30px", color: "#3B2510" }}>📚 AULA v00</h1>
                        <div style={{ marginTop: "30px" }}>
                            <button onClick={() => setVista("gestor")} className="btn-marron" style={{ padding: "15px", fontSize: "18px", width: "100%", margin: "10px 0" }}>👩‍🏫 PROFESORA</button>
                            {alumnosAprobadosLogin.map(a => (
                                <button key={a.id} onClick={() => { setAlumnoActual(a); setVista("alumno"); }} className="btn-verde" style={{ padding: "15px", fontSize: "18px", width: "100%", margin: "10px 0" }}>
                                    👨‍🎓 {a.nombre} {a.apellidos}
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }
            
            // GESTOR
            if (vista === "gestor") {
                return (
                    <div>
                        <div className="header">
                            <div className="header-titulo">👩‍🏫 PROFESORA AULA DIGITAL: Marta López de Letona S.</div>
                            <button onClick={() => setVista("login")} className="btn-salir">Salir</button>
                        </div>
                        <div className="menu">
                            <button onClick={() => setSeccionGestor("pendientes")} className={seccionGestor === "pendientes" ? "menu-btn active" : "menu-btn"}>⏳ Pendientes ({pendientes.length})</button>
                            <button onClick={() => setSeccionGestor("alumnos")} className={seccionGestor === "alumnos" ? "menu-btn active" : "menu-btn"}>👥 Alumnos ({aprobados.length})</button>
                            <button onClick={() => setSeccionGestor("asignar")} className={seccionGestor === "asignar" ? "menu-btn active" : "menu-btn"}>📋 Asignar ({grupos.length})</button>
                            <button onClick={() => setSeccionGestor("biblioteca")} className={seccionGestor === "biblioteca" ? "menu-btn active" : "menu-btn"}>📚 Biblioteca ({artefactos.length})</button>
                            <button onClick={() => setSeccionGestor("historial")} className={seccionGestor === "historial" ? "menu-btn active" : "menu-btn"}>📊 Historial</button>
                        </div>
                        
                        {seccionGestor === "pendientes" && pendientes.map(a => (
                            <div key={a.id} className="card">
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "10px" }}>
                                    <div><strong>{a.nombre} {a.apellidos}</strong><br/>{a.email}</div>
                                    <div>
                                        <select id={`grupo-${a.id}`}>{grupos.map(g => <option key={g}>{g}</option>)}</select>
                                        <button onClick={() => aprobarAlumno(a.id, document.getElementById(`grupo-${a.id}`).value)} className="btn-verde">Aprobar</button>
                                        <button onClick={() => eliminarAlumno(a.id)} className="btn-rojo">Rechazar</button>
                                    </div>
                                </div>
                            </div>
                        ))}
                        
                        {seccionGestor === "alumnos" && (
                            <div>
                                <h3 style={{ marginBottom: "15px", color: "#3B2510" }}>📋 Alumnos por grupo</h3>
                                {Object.keys(alumnosPorGrupo).map(nombreGrupo => (
                                    <div key={nombreGrupo} className="grupo-alumnos">
                                        <div className="grupo-header">
                                            <span>📁 {nombreGrupo}</span>
                                            <span>{alumnosPorGrupo[nombreGrupo].length} alumnos</span>
                                        </div>
                                        <table className="tabla-alumnos">
                                            <thead><tr><th>Alumno</th><th>Email</th><th>Cambiar grupo</th><th>Acción</th></tr></thead>
                                            <tbody>
                                                {alumnosPorGrupo[nombreGrupo].map(a => (
                                                    <tr key={a.id}>
                                                        <td><strong>{a.nombre} {a.apellidos}</strong></td>
                                                        <td>{a.email}</td>
                                                        <td>
                                                            <select id={`select-${a.id}`} defaultValue={a.grupo || "Sin grupo"}>
                                                                {grupos.map(g => <option key={g} value={g}>{g}</option>)}
                                                                <option value="Sin grupo">Sin grupo</option>
                                                            </select>
                                                            <button onClick={() => {
                                                                const nuevoGrupo = document.getElementById(`select-${a.id}`).value;
                                                                if (nuevoGrupo !== (a.grupo || "Sin grupo")) {
                                                                    cambiarGrupoAlumno(a.id, nuevoGrupo === "Sin grupo" ? null : nuevoGrupo);
                                                                }
                                                            }} className="btn-cambiar-grupo">Cambiar</button>
                                                        </td>
                                                        <td><button onClick={() => eliminarAlumno(a.id)} className="btn-rojo" style={{ padding: "4px 12px", fontSize: "12px" }}>Eliminar</button></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                ))}
                            </div>
                        )}
                        
                        {seccionGestor === "asignar" && (
                            <div>
                                <div className="acciones-grupo">
                                    <button onClick={crearGrupo} className="btn-marron">+ Nuevo grupo</button>
                                    <button onClick={() => setMostrarModalCopiarGrupo(true)} className="btn-naranja">📋 Copiar grupo</button>
                                </div>
                                
                                {/* Modal para copiar grupo */}
                                {mostrarModalCopiarGrupo && (
                                    <div className="modal">
                                        <div className="modal-content">
                                            <h3>📋 Copiar grupo</h3>
                                            <p style={{ marginBottom: "15px", color: "#666" }}>Copia todas las tareas de un grupo existente a uno nuevo</p>
                                            
                                            <div style={{ marginBottom: "15px" }}>
                                                <label style={{ display: "block", marginBottom: "5px", fontWeight: "bold" }}>Grupo origen:</label>
                                                <select 
                                                    value={grupoOrigen} 
                                                    onChange={e => setGrupoOrigen(e.target.value)}
                                                    style={{ width: "100%", padding: "10px" }}
                                                >
                                                    <option value="">-- Seleccionar grupo --</option>
                                                    {grupos.map(g => (
                                                        <option key={g} value={g}>{g}</option>
                                                    ))}
                                                </select>
                                            </div>
                                            
                                            <div style={{ marginBottom: "20px" }}>
                                                <label style={{ display: "block", marginBottom: "5px", fontWeight: "bold" }}>Nombre del nuevo grupo:</label>
                                                <input 
                                                    type="text" 
                                                    value={nuevoNombreGrupo} 
                                                    onChange={e => setNuevoNombreGrupo(e.target.value)}
                                                    placeholder="Ej: Grupo B - 2024"
                                                    style={{ width: "100%", padding: "10px" }}
                                                />
                                            </div>
                                            
                                            <div style={{ display: "flex", gap: "10px", justifyContent: "flex-end" }}>
                                                <button onClick={() => {
                                                    setMostrarModalCopiarGrupo(false);
                                                    setGrupoOrigen("");
                                                    setNuevoNombreGrupo("");
                                                }} className="btn-gris">Cancelar</button>
                                                <button onClick={copiarGrupo} className="btn-verde">Copiar grupo</button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                
                                {grupos.map(grupo => {
                                    const tareasAsignadas = (tareasPorGrupo[grupo] || []).map(id => artefactos.find(a => a.id == id)).filter(a => a);
                                    const tareasDisponibles = artefactos.filter(a => !(tareasPorGrupo[grupo] || []).includes(a.id.toString()));
                                    return (
                                        <div key={grupo} className="grupo-tareas">
                                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "15px" }}>
                                                <h3>📁 {grupo}</h3>
                                                <button onClick={() => eliminarGrupo(grupo)} className="btn-rojo">Eliminar</button>
                                            </div>
                                            <div style={{ marginBottom: "15px", display: "flex", gap: "10px", alignItems: "center", flexWrap: "wrap" }}>
                                                <select value={tareaSeleccionada} onChange={e => setTareaSeleccionada(e.target.value)} style={{ flex: 1, minWidth: "200px" }}>
                                                    <option value="">-- Asignar tarea --</option>
                                                    {tareasDisponibles.map(t => <option key={t.id} value={t.id}>{t.nombre}</option>)}
                                                </select>
                                                <button onClick={() => asignarTareaAGrupo(grupo, tareaSeleccionada)} className="btn-verde">➕ Asignar</button>
                                            </div>
                                            <h4>✓ Tareas asignadas ({tareasAsignadas.length})</h4>
                                            {tareasAsignadas.map(t => (
                                                <div key={t.id} className="tarea-item">
                                                    <span><strong>{t.nombre}</strong> <span style={{ fontSize: "11px", color: "#666" }}>{t.nivel}</span></span>
                                                    <button onClick={() => quitarTareaDeGrupo(grupo, t.id)} className="btn-rojo" style={{ padding: "4px 12px", fontSize: "12px" }}>Quitar</button>
                                                </div>
                                            ))}
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                        
                        {seccionGestor === "biblioteca" && (
                            <div>
                                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "20px", alignItems: "center" }}>
                                    <h3>📚 Biblioteca de artefactos ({artefactos.length})</h3>
                                    <button onClick={() => setMostrarModalArtefacto(true)} className="btn-verde">+ Nuevo artefacto</button>
                                </div>
                                {mostrarModalArtefacto && (
                                    <div className="modal">
                                        <div className="modal-content">
                                            <h3>➕ Nuevo artefacto</h3>
                                            <input type="text" placeholder="Nombre del artefacto" value={nuevoArtefacto.nombre} onChange={e => setNuevoArtefacto({...nuevoArtefacto, nombre: e.target.value})} style={{ width: "100%", marginBottom: "15px", padding: "10px" }} />
                                            <textarea rows="8" placeholder="Pega aquí el código HTML del artefacto" value={nuevoArtefacto.html} onChange={e => setNuevoArtefacto({...nuevoArtefacto, html: e.target.value})} style={{ width: "100%", fontFamily: "monospace", fontSize: "12px", marginBottom: "15px" }} />
                                            <div style={{ display: "flex", gap: "10px", justifyContent: "flex-end" }}>
                                                <button onClick={() => setMostrarModalArtefacto(false)} className="btn-gris">Cancelar</button>
                                                <button onClick={agregarArtefacto} className="btn-verde">Añadir</button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {artefactos.map(art => (
                                    <div key={art.id} className="artefacto-item" style={{ background: "white", borderRadius: "12px", marginBottom: "10px", border: "1px solid #ddd" }}>
                                        <div><strong>{art.nombre}</strong><br/><span style={{ fontSize: "12px", color: "#666" }}>{art.descripcion}</span></div>
                                        <button onClick={() => copiarCodigo(art.html)} className="btn-azul" style={{ padding: "4px 12px", fontSize: "12px" }}>📋 Copiar HTML</button>
                                    </div>
                                ))}
                            </div>
                        )}
                        
                        {seccionGestor === "historial" && (
                            <div>
                                <h3 style={{ marginBottom: "15px" }}>📊 Historial de calificaciones</h3>
                                {grupos.map(grupo => {
                                    const alumnosGrupo = aprobados.filter(a => a.grupo === grupo);
                                    if (alumnosGrupo.length === 0) return null;
                                    const tareasGrupoList = tareasPorGrupo[grupo] || [];
                                    const tareasInfo = tareasGrupoList.map(id => artefactos.find(a => a.id == id)).filter(a => a);
                                    return (
                                        <div key={grupo} className="grupo-historial">
                                            <div className="historial-header">📁 {grupo}</div>
                                            <div style={{ overflowX: "auto" }}>
                                                <table className="historial-tabla">
                                                    <thead>
                                                        <tr>
                                                            <th style={{ position: "sticky", left: 0, background: "#e8dfc8" }}>Alumno</th>
                                                            <th style={{ position: "sticky", left: "150px", background: "#e8dfc8" }}>📊 Media</th>
                                                            {tareasInfo.map(t => <th key={t.id}>{t.nombre}</th>)}
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {alumnosGrupo.map(alumno => {
                                                            const media = getMediaAlumno(alumno.id, tareasGrupoList);
                                                            return (
                                                                <tr key={alumno.id}>
                                                                    <td style={{ position: "sticky", left: 0, background: "white" }}><strong>{alumno.nombre} {alumno.apellidos}</strong></td>
                                                                    <td style={{ position: "sticky", left: "150px", background: "white" }}>{media !== null ? <span className={`nota-cell ${getClaseNota(parseFloat(media))}`}>{media}/10</span> : <span className="nota-vacia">—</span>}</td>
                                                                    {tareasInfo.map(tarea => {
                                                                        const nota = getMejorNota(alumno.id, tarea.id);
                                                                        return <td key={tarea.id}>{nota !== null ? <span className={`nota-cell ${getClaseNota(nota)}`}>{nota}</span> : <span className="nota-vacia">—</span>}</td>;
                                                                    })}
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                        
                        <div className="footer"><div className="footer-texto">mlls</div></div>
                        {toast && <div className="toast">{toast}</div>}
                    </div>
                );
            }
            
            // ALUMNO
            if (vista === "alumno" && alumnoActual) {
                const tareasDelGrupo = tareasPorGrupo[alumnoActual.grupo] || [];
                const misTareas = artefactos.filter(t => tareasDelGrupo.includes(t.id.toString()));
                
                return (
                    <div>
                        <div className="header">
                            <div className="header-titulo">👩‍🎓 {alumnoActual.nombre} {alumnoActual.apellidos} • {alumnoActual.grupo || "Sin grupo"}</div>
                            <button onClick={() => setVista("login")} className="btn-salir">Salir</button>
                        </div>
                        <div className="menu">
                            <button onClick={() => setSeccionAlumno("tareas")} className={seccionAlumno === "tareas" ? "menu-btn active" : "menu-btn"}>📚 Mis Tareas</button>
                            <button onClick={() => setSeccionAlumno("historial")} className={seccionAlumno === "historial" ? "menu-btn active" : "menu-btn"}>📊 Mi Historial</button>
                        </div>
                        
                        {seccionAlumno === "tareas" && (
                            <div>
                                {misTareas.length === 0 ? (
                                    <div className="card">No hay tareas asignadas para tu grupo</div>
                                ) : (
                                    misTareas.map(t => {
                                        const nota = getMejorNota(alumnoActual.id, t.id);
                                        return (
                                            <div key={t.id} className="card" style={{ borderLeft: nota !== null ? `4px solid ${nota >= 5 ? "#2E6B3E" : "#c0392b"}` : "4px solid #D97A2B" }}>
                                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap" }}>
                                                    <div>
                                                        <h3>{t.nombre}</h3>
                                                        <p>{t.descripcion}</p>
                                                        {nota !== null && <p><strong>Tu nota: {nota}/10</strong></p>}
                                                    </div>
                                                    <button className="btn-marron" style={{ padding: "10px 20px" }}>▶ Realizar tarea</button>
                                                </div>
                                            </div>
                                        );
                                    })
                                )}
                            </div>
                        )}
                        
                        {seccionAlumno === "historial" && (
                            <div className="card">
                                <h3>📊 Mi historial de calificaciones</h3>
                                <table style={{ width: "100%", borderCollapse: "collapse", marginTop: "15px" }}>
                                    <thead>
                                        <tr style={{ background: "#3B2510", color: "white" }}>
                                            <th style={{ padding: "10px", textAlign: "left" }}>Tarea</th>
                                            <th style={{ padding: "10px", textAlign: "center" }}>Nota</th>
                                            <th style={{ padding: "10px", textAlign: "center" }}>Fecha</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {misTareas.flatMap(t => {
                                            const califs = calificaciones[alumnoActual.id]?.[t.id] || [];
                                            return califs.map((c, i) => (
                                                <tr key={`${t.id}-${i}`} style={{ borderBottom: "1px solid #ddd" }}>
                                                    <td style={{ padding: "10px" }}>{t.nombre}</td>
                                                    <td style={{ padding: "10px", textAlign: "center", fontWeight: "bold", color: c.nota >= 5 ? "#2E6B3E" : "#c0392b" }}>{c.nota}/10</td>
                                                    <td style={{ padding: "10px", textAlign: "center", fontSize: "12px" }}>{new Date(c.fecha).toLocaleDateString()}</td>
                                                </tr>
                                            ));
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        )}
                        
                        <div className="footer"><div className="footer-texto">mlls</div></div>
                    </div>
                );
            }
            
            return null;
        }
        
        ReactDOM.render(<App />, document.getElementById("root"));
    </script>
</body>
</html>
